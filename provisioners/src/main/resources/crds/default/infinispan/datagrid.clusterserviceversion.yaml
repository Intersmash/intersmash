apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "infinispan.org/v1",
          "kind": "Infinispan",
          "metadata": {
            "name": "example-infinispan"
          },
          "spec": {
            "replicas": 1
          }
        },
        {
          "apiVersion": "infinispan.org/v2alpha1",
          "kind": "Backup",
          "metadata": {
            "name": "example-backup"
          },
          "spec": {
            "cluster": "example-infinispan",
            "container": {
              "cpu": "1000m",
              "extraJvmOpts": "-Djava.property=me",
              "memory": "1Gi"
            }
          }
        },
        {
          "apiVersion": "infinispan.org/v2alpha1",
          "kind": "Batch",
          "metadata": {
            "name": "example-batch-inline"
          },
          "spec": {
            "cluster": "example-infinispan",
            "config": "create counter --concurrency-level=1 --initial-value=5 --storage=VOLATILE --type=weak batch-counter\n"
          }
        },
        {
          "apiVersion": "infinispan.org/v2alpha1",
          "kind": "Cache",
          "metadata": {
            "name": "example-cache"
          },
          "spec": {
            "clusterName": "example-infinispan",
            "name": "mycache",
            "template": "\u003cdistributed-cache /\u003e"
          }
        },
        {
          "apiVersion": "infinispan.org/v2alpha1",
          "kind": "Restore",
          "metadata": {
            "name": "example-restore"
          },
          "spec": {
            "cluster": "example-infinispan",
            "container": {
              "cpu": "1000m",
              "extraJvmOpts": "-Djava.property=me",
              "memory": "1Gi"
            }
          }
        }
      ]
